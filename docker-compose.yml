services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: makriva
      POSTGRES_PASSWORD: makriva
      POSTGRES_DB: makriva
    ports:
      - "5432:5432"
    volumes:
      - makriva-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - makriva-redis:/data

volumes:
  makriva-postgres:
  makriva-redis:
